# Redis 配置文件

# 绑定地址（0.0.0.0 允许所有 IP 访问）
bind 0.0.0.0

# 保护模式（关闭以允许远程访问）
protected-mode no

# 端口
port 6379

# 持久化配置
# RDB 持久化
save 900 1      # 900 秒内至少 1 个 key 变化
save 300 10     # 300 秒内至少 10 个 key 变化
save 60 10000   # 60 秒内至少 10000 个 key 变化

# RDB 文件名
dbfilename dump.rdb

# 数据目录
dir /data

# AOF 持久化（可选，更安全但性能稍低）
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# 最大内存限制（根据需要调整）
maxmemory 256mb

# 内存淘汰策略
maxmemory-policy allkeys-lru

# 日志级别
loglevel notice

# 日志文件
logfile ""

# 数据库数量
databases 16

# 密码（可选，取消注释并设置密码）
# requirepass your_password

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 客户端连接数
maxclients 10000

# TCP 连接配置
tcp-backlog 511
timeout 0
tcp-keepalive 300
