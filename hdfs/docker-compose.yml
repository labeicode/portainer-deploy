version: '3.8'

services:
  namenode:
    build: .
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870"  # Web UI 端口
      - "9001:9001"  # RPC 端口
    volumes:
      - ./data/namenode:/opt/hadoop/data/namenode
    networks:
      hadoop-net:
        ipv4_address: 172.25.0.2
    command: >
      bash -c "hdfs namenode -format -force &&
      hdfs --daemon start namenode &&
      tail -f /opt/hadoop/logs/hadoop-root-namenode-namenode.log"

  datanode1:
    build: .
    container_name: datanode1
    hostname: datanode1
    depends_on:
      - namenode
    ports:
      - "9866:9866"  # ⭐ DataNode1 数据传输端口
      - "9864:9864"  # DataNode1 HTTP 端口
      - "9867:9867"  # DataNode1 IPC 端口
    volumes:
      - ./data/datanode1:/opt/hadoop/data/datanode
    networks:
      hadoop-net:
        ipv4_address: 172.25.0.3
    command: >
      bash -c "sleep 10 &&
      hdfs --daemon start datanode &&
      tail -f /opt/hadoop/logs/hadoop-root-datanode-datanode1.log"

  datanode2:
    build: .
    container_name: datanode2
    hostname: datanode2
    depends_on:
      - namenode
    ports:
      - "9868:9868"  # ⭐ DataNode2 数据传输端口（容器内外都用 9868）
      - "9865:9865"  # DataNode2 HTTP 端口
      - "9869:9869"  # DataNode2 IPC 端口
    volumes:
      - ./data/datanode2:/opt/hadoop/data/datanode
    networks:
      hadoop-net:
        ipv4_address: 172.25.0.4
    environment:
      - HDFS_DATANODE_OPTS=-Ddfs.datanode.address=0.0.0.0:9868 -Ddfs.datanode.http.address=0.0.0.0:9865 -Ddfs.datanode.ipc.address=0.0.0.0:9869
    command: >
      bash -c "sleep 10 &&
      hdfs --daemon start datanode &&
      tail -f /opt/hadoop/logs/hadoop-root-datanode-datanode2.log"

# 定义网络
networks:
  hadoop-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
